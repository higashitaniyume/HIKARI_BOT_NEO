    <section class="view-panel" data-view="aiagent_memory" hidden>
      <section class="panel config-panel">
        <div class="panel-heading">
          <div>
            <h2>AI Agent 记忆</h2>
            <p>查看和管理所有群聊/私聊的持久化记忆文件。超过10分钟无新消息时自动总结。</p>
          </div>
          <button type="button" id="memoryRefreshBtn" class="ghost">刷新</button>
        </div>

        <div class="ops-layout">
          <aside class="ops-list" id="memoryFileList" role="list" aria-label="记忆文件列表">
            <p class="empty-state">正在加载...</p>
          </aside>

          <section class="ops-detail" id="memoryDetailPanel" hidden>
            <div class="ops-detail-head">
              <div>
                <h3 id="memoryDetailTitle">选择一个文件查看</h3>
                <p id="memoryDetailMeta">点击左侧记忆文件查看内容</p>
              </div>
              <div class="item-actions">
                <span id="memoryStatus" class="memory-status" style="font-size:13px;min-width:120px;text-align:right;"></span>
                <button type="button" id="memorySummarizeBtn" class="ghost">总结此文件</button>
              </div>
            </div>
            <pre id="memoryDetailContent" class="memory-content code-editor" style="white-space:pre-wrap;font-size:13px;line-height:1.6;overflow:auto;font-family:inherit;padding:16px;margin:0;">选择左侧文件后在此显示内容</pre>
          </section>
        </div>
      </section>
    </section>
