    <dialog id="packPickerDialog" class="pack-picker-dialog">
      <div class="pack-picker">
        <div class="pack-picker-head">
          <div>
            <h3 id="packPickerTitle">移动到贴纸包</h3>
            <p id="packPickerSummary">选择一个目标贴纸包。</p>
          </div>
          <button type="button" id="packPickerClose" class="icon-button" aria-label="关闭">×</button>
        </div>

        <label class="pack-picker-search">
          <span>搜索贴纸包</span>
          <input id="packPickerSearch" autocomplete="off" placeholder="输入贴纸包名称">
        </label>

        <div id="packPickerRecent" class="pack-picker-section" hidden>
          <h4>最近使用</h4>
          <div id="packPickerRecentList" class="pack-picker-list"></div>
        </div>

        <div class="pack-picker-section">
          <h4>全部贴纸包</h4>
          <div id="packPickerList" class="pack-picker-list"></div>
        </div>
      </div>
    </dialog>
