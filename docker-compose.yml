name: hikari-bot-neo

services:
  hikaribot:
    image: ${HIKARI_PYTHON_IMAGE:-python:3.12-slim-bookworm}
    container_name: hikaribot-docker
    restart: unless-stopped
    depends_on:
      - napcat
      - cobalt
      - searxng
    environment:
      TZ: Asia/Shanghai
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      UV_PROJECT_ENVIRONMENT: /opt/hikaribot-venv
      UV_LINK_MODE: copy
    ports:
      - "${HIKARI_BOT_ADMIN_PORT:-${HIKARI_STICKER_WEB_PORT:-54213}}:54213"
    working_dir: /app
    entrypoint: ["sh", "/app/docker/entrypoint.sh"]
    command: ["python", "bot.py"]
    volumes:
      # 源码直接挂载；更新代码后只需重启容器，无需构建项目镜像。
      - .:/app:ro
      # BotData 被独立数据卷覆盖后，仍从此只读挂载读取 example 默认配置。
      - .:/opt/hikaribot-source:ro
      - ./BotData:/app/BotData
      - ./UserData:/app/UserData
      - ./runtime/shared:/app/sharedFolder
      - ./runtime/tmp/hikari_bot:/tmp/hikari_bot
      - hikaribot_venv:/opt/hikaribot-venv
    extra_hosts:
      - "host.docker.internal:host-gateway"

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: unless-stopped
    environment:
      NAPCAT_UID: "${NAPCAT_UID:-0}"
      NAPCAT_GID: "${NAPCAT_GID:-0}"
      ACCOUNT: "${NAPCAT_ACCOUNT:-}"
      TZ: Asia/Shanghai
    ports:
      - "${NAPCAT_WEBUI_PORT:-3000}:3000"
      - "${NAPCAT_WS_PORT:-3001}:3001"
      - "${NAPCAT_ONEBOT_PORT:-6099}:6099"
      - "${NAPCAT_REVERSE_WS_PORT:-54258}:54258"
      - "${NAPCAT_EXTRA_PORT:-3004}:3004"
      - "${NAPCAT_BOT_WS_PORT:-54253}:54253"
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/ntqq:/app/.config/QQ
      - ./runtime/shared:/app/sharedFolder
      - ./legacy/pixiv_cache:/opt/HIKARI_BOT/data/pixiv_cache
      - ./runtime/tmp/hikari_bot:/tmp/hikari_bot

  cobalt:
    image: ghcr.io/imputnet/cobalt:11
    container_name: cobalt
    init: true
    read_only: true
    restart: unless-stopped
    ports:
      - "${COBALT_PORT:-54257}:9000/tcp"
    environment:
      API_URL: "${COBALT_API_URL:-http://127.0.0.1:54257/}"

  searxng:
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    container_name: searxng-core
    restart: always
    ports:
      - "${SEARXNG_HOST:+${SEARXNG_HOST}:}${SEARXNG_PORT:-54261}:8080"
    volumes:
      - ./searxng/core-config:/etc/searxng:Z
      - searxng_core_data:/var/cache/searxng
    depends_on:
      - searxng-valkey

  searxng-valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: searxng-valkey
    command: valkey-server --save 30 1 --loglevel warning
    restart: always
    volumes:
      - searxng_valkey_data:/data

volumes:
  hikaribot_venv:
  searxng_core_data:
  searxng_valkey_data:
